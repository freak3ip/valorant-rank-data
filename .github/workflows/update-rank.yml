name: Update Valorant Rank

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch:

jobs:
  update-rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'  # Используем Node 16 (более стабильный)

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Run parser
        run: node .github/scripts/parser.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rank.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление ранга [$(date +'%Y-%m-%d %H:%M')]"
          git push