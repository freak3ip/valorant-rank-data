name: Update Valorant Rank

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm init -y
          npm install axios@1.6.2 cheerio@1.0.0-rc.12

      - name: Run parser
        run: node .github/scripts/parser.js
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rank.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update rank [skip ci]" && git push)