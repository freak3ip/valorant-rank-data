name: Update Valorant Rank

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-rank:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2

      - name: Use Node.js 14
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install axios
        run: npm init -y && npm install axios@0.21.4

      - name: Run parser
        run: node .github/scripts/parser.js

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rank.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update rank"
          git push